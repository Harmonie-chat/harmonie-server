services:
  # PostgreSQL Database
  postgres:
    image: postgres:18.2-alpine
    container_name: harmonie-postgres
    environment:
      POSTGRES_USER: harmonie_user
      POSTGRES_PASSWORD: harmonie_password
      POSTGRES_DB: harmonie
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - harmonie-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harmonie_user -d harmonie"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Database migrations (runs once then exits)
  harmonie-migrations:
    build:
      context: .
      dockerfile: tools/Harmonie.Migrations/Dockerfile
    container_name: harmonie-migrations
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=harmonie;Username=harmonie_user;Password=harmonie_password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - harmonie-network
    restart: "no"

  # LiveKit Server
  livekit:
    image: livekit/livekit-server:latest
    container_name: harmonie-livekit
    environment:
      LIVEKIT_CONFIG: |
        keys:
          devkey: devsecret-that-is-long-enough-for-hmac-signing
        webhook:
          api_key: devkey
          urls:
            - http://harmonie-api:80/api/webhooks/livekit
    command:
      - --dev
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-60000:50000-60000/udp"
    networks:
      - harmonie-network

  # Garage S3-compatible object storage
  garage:
    image: dxflrs/garage:v2.0.0
    environment:
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:-harmonie-admin-token}
      GARAGE_METRICS_TOKEN: ${GARAGE_METRICS_TOKEN:-harmonie-metrics-token}
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    ports:
      - "${GARAGE_S3_PORT:-3900}:3900"
      - "${GARAGE_RPC_PORT:-3901}:3901"
      - "${GARAGE_ADMIN_PORT:-3903}:3903"
    volumes:
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    configs:
      - source: garage-config
        target: /etc/garage.toml
    command:
      - /garage
      - server
    networks:
      - harmonie-network

  # Harmonie API
  harmonie-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: harmonie-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=harmonie;Username=harmonie_user;Password=harmonie_password
      - LiveKit__PublicUrl=ws://localhost:7880
      - LiveKit__InternalUrl=http://livekit:7880
      - LiveKit__ApiKey=devkey
      - LiveKit__ApiSecret=devsecret-that-is-long-enough-for-hmac-signing
      - Uploads__MaxFileSizeBytes=26214400
      - ObjectStorage__Endpoint=http://garage:3900
      - ObjectStorage__PublicBaseUrl=http://localhost:3900/harmonie-uploads
      - ObjectStorage__BucketName=harmonie-uploads
      - ObjectStorage__Region=garage
      - ObjectStorage__AccessKeyId=GK0123456789abcdef01234567
      - ObjectStorage__SecretAccessKey=abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789
      - ObjectStorage__ForcePathStyle=true
      - ObjectStorage__CreateBucketIfMissing=true
    ports:
      - "5001:80"
    depends_on:
      postgres:
        condition: service_healthy
      harmonie-migrations:
        condition: service_completed_successfully
      livekit:
        condition: service_started
      garage:
        condition: service_started
    networks:
      - harmonie-network

volumes:
  postgres-data:
    driver: local
  garage-meta:
    driver: local
  garage-data:
    driver: local

networks:
  harmonie-network:
    driver: bridge

configs:
  garage-config:
    content: |
      metadata_dir = "/var/lib/garage/meta"
      data_dir = "/var/lib/garage/data"
      db_engine = "sqlite"
      metadata_auto_snapshot_interval = "6h"
      replication_factor = 1
      consistency_mode = "consistent"

      rpc_bind_addr = "[::]:3901"
      rpc_public_addr = "garage:3901"
      rpc_secret = "${GARAGE_RPC_SECRET:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}"

      compression_level = 2

      [s3_api]
      s3_region = "garage"
      api_bind_addr = "[::]:3900"

      [admin]
      api_bind_addr = "[::]:3903"
      admin_token = "${GARAGE_ADMIN_TOKEN:-harmonie-admin-token}"
      metrics_token = "${GARAGE_METRICS_TOKEN:-harmonie-metrics-token}"
