services:
  # PostgreSQL Database
  postgres:
    image: postgres:18.2-alpine
    container_name: harmonie-postgres
    environment:
      POSTGRES_USER: harmonie_user
      POSTGRES_PASSWORD: harmonie_password
      POSTGRES_DB: harmonie
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - harmonie-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harmonie_user -d harmonie"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Database migrations (runs once then exits)
  harmonie-migrations:
    build:
      context: .
      dockerfile: tools/Harmonie.Migrations/Dockerfile
    container_name: harmonie-migrations
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=harmonie;Username=harmonie_user;Password=harmonie_password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - harmonie-network
    restart: "no"

  # LiveKit Server
  livekit:
    image: livekit/livekit-server:latest
    container_name: harmonie-livekit
    environment:
      LIVEKIT_CONFIG: |
        keys:
          devkey: devsecret-that-is-long-enough-for-hmac-signing
        webhook:
          api_key: devkey
          urls:
            - http://harmonie-api:80/api/webhooks/livekit
    command:
      - --dev
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-60000:50000-60000/udp"
    networks:
      - harmonie-network

  # SeaweedFS S3-compatible object storage
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: server -s3 -s3.config=/etc/s3.config.json
    ports:
      - "${WEED_S3_PORT:-8333}:8333"
    volumes:
      - seaweedfs-data:/data
    configs:
      - source: seaweedfs-s3-config
        target: /etc/s3.config.json
    networks:
      - harmonie-network

  # Harmonie API
  harmonie-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: harmonie-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=harmonie;Username=harmonie_user;Password=harmonie_password
      - LiveKit__PublicUrl=ws://localhost:7880
      - LiveKit__InternalUrl=http://livekit:7880
      - LiveKit__ApiKey=devkey
      - LiveKit__ApiSecret=devsecret-that-is-long-enough-for-hmac-signing
      - Uploads__MaxFileSizeBytes=26214400
      - ObjectStorage__Provider=s3
      - ObjectStorage__Endpoint=http://seaweedfs:8333
      - ObjectStorage__PublicBaseUrl=http://localhost:8333/harmonie-uploads
      - ObjectStorage__BucketName=harmonie-uploads
      - ObjectStorage__Region=us-east-1
      - ObjectStorage__AccessKeyId=harmonie-key
      - ObjectStorage__SecretAccessKey=harmonie-secret-key-for-dev
      - ObjectStorage__ForcePathStyle=true
      - ObjectStorage__CreateBucketIfMissing=true
    ports:
      - "5001:80"
    depends_on:
      postgres:
        condition: service_healthy
      harmonie-migrations:
        condition: service_completed_successfully
      livekit:
        condition: service_started
      seaweedfs:
        condition: service_started
    networks:
      - harmonie-network

volumes:
  postgres-data:
    driver: local
  seaweedfs-data:
    driver: local

networks:
  harmonie-network:
    driver: bridge

configs:
  seaweedfs-s3-config:
    content: |
      {
        "identities": [
          {
            "name": "harmonie",
            "credentials": [{"accessKey": "harmonie-key", "secretKey": "harmonie-secret-key-for-dev"}],
            "actions": ["Admin", "Read", "Write", "List"]
          }
        ]
      }
