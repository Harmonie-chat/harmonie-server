services:
  # PostgreSQL Database
  postgres:
    image: postgres:18.2-alpine
    container_name: harmonie-postgres
    environment:
      POSTGRES_USER: harmonie_user
      POSTGRES_PASSWORD: harmonie_password
      POSTGRES_DB: harmonie
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "54321:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - harmonie-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harmonie_user -d harmonie"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Database migrations (runs once then exits)
  harmonie-migrations:
    build:
      context: .
      dockerfile: tools/Harmonie.Migrations/Dockerfile
    container_name: harmonie-migrations
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=harmonie;Username=harmonie_user;Password=harmonie_password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - harmonie-network
    restart: "no"

  # LiveKit Server
  livekit:
    image: livekit/livekit-server:latest
    container_name: harmonie-livekit
    environment:
      LIVEKIT_CONFIG: |
        keys:
          devkey: devsecret-that-is-long-enough-for-hmac-signing
        webhook:
          api_key: devkey
          urls:
            - http://harmonie-api:80/api/webhooks/livekit
        rtc:
          use_external_ip: false
          node_ip: 192.168.1.67
          port_range_start: 55000
          port_range_end: 55010
    ports:
      - "7880:7880"
      - "7881:7881"
      - "55000-55010:55000-55010/udp"
    networks:
      - harmonie-network

  # Harmonie API
  harmonie-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: harmonie-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=harmonie;Username=harmonie_user;Password=harmonie_password
      - LiveKit__PublicUrl=ws://192.168.1.67:7880
      - LiveKit__InternalUrl=http://livekit:7880
      - LiveKit__ApiKey=devkey
      - LiveKit__ApiSecret=devsecret-that-is-long-enough-for-hmac-signing
      - Uploads__MaxFileSizeBytes=26214400
      - ObjectStorage__LocalBasePath=/app/uploads
      - ObjectStorage__LocalBaseUrl=http://192.168.1.67:55401/files
    ports:
      - "55401:80"
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      harmonie-migrations:
        condition: service_completed_successfully
      livekit:
        condition: service_started
    networks:
      - harmonie-network

  # Harmonie background workers (optional)
  harmonie-workers:
    profiles: ["workers"]
    build:
      context: .
      dockerfile: src/Harmonie.Workers/Dockerfile
    container_name: harmonie-workers
    environment:
      - DOTNET_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=harmonie;Username=harmonie_user;Password=harmonie_password
      - PushNotifications__Enabled=false
      - VAPID_PUBLIC_KEY=
      - VAPID_PRIVATE_KEY=
      - VAPID_SUBJECT=mailto:contact@harmonie.app
    depends_on:
      postgres:
        condition: service_healthy
      harmonie-migrations:
        condition: service_completed_successfully
    networks:
      - harmonie-network

volumes:
  postgres-data:
    driver: local
  uploads-data:
    driver: local

networks:
  harmonie-network:
    driver: bridge
