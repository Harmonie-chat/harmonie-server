services:
  # PostgreSQL Database
  postgres:
    image: postgres:18.2-alpine
    container_name: harmonie-postgres
    environment:
      POSTGRES_USER: harmonie_user
      POSTGRES_PASSWORD: harmonie_password
      POSTGRES_DB: harmonie
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - harmonie-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harmonie_user -d harmonie"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Database migrations (runs once then exits)
  harmonie-migrations:
    build:
      context: .
      dockerfile: tools/Harmonie.Migrations/Dockerfile
    container_name: harmonie-migrations
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=harmonie;Username=harmonie_user;Password=harmonie_password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - harmonie-network
    restart: "no"

  # Harmonie API
  harmonie-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: harmonie-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=harmonie;Username=harmonie_user;Password=harmonie_password
    ports:
      - "5001:80"
    depends_on:
      postgres:
        condition: service_healthy
      harmonie-migrations:
        condition: service_completed_successfully
    networks:
      - harmonie-network

volumes:
  postgres-data:
    driver: local

networks:
  harmonie-network:
    driver: bridge
