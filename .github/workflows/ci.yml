name: CI/CD

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]
    branches: [ main, develop ]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-link-pr-issue:
    runs-on: ubuntu-latest

    steps:
    - name: Auto-link PR to issue from branch name
      uses: actions/github-script@v7
      with:
        script: |
          const pr = context.payload.pull_request;
          const headRef = pr?.head?.ref ?? "";
          const prBody = pr?.body ?? "";

          const isFromFork =
            (pr?.head?.repo?.fork ?? false) ||
            pr?.head?.repo?.full_name !== context.payload.repository?.full_name;

          if (isFromFork) {
            core.info("PR comes from a fork; skipping automatic PR body update.");
            return;
          }

          const branchIssueMatch = headRef.match(/(?:^|\/)(\d+)-/);
          if (!branchIssueMatch) {
            core.info(`No issue number found in branch name: ${headRef}`);
            return;
          }

          const issueNumber = branchIssueMatch[1];
          const hasClosingKeywordForBranchIssue = new RegExp(
            `\\b(close[sd]?|fix(e[sd])?|resolve[sd]?)\\s+#${issueNumber}\\b`,
            "i"
          ).test(prBody);

          if (hasClosingKeywordForBranchIssue) {
            core.info(`PR already contains a closing reference to #${issueNumber}.`);
            return;
          }

          const trimmedBody = prBody.trim();
          const suffix = `Closes #${issueNumber}`;
          const updatedBody = trimmedBody.length > 0 ? `${trimmedBody}\n\n${suffix}` : suffix;

          await github.rest.pulls.update({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: pr.number,
            body: updatedBody
          });

          core.info(`Added "${suffix}" to PR description.`);

  validate-pr-issue-link:
    runs-on: ubuntu-latest
    needs: auto-link-pr-issue

    steps:
    - name: Validate PR links to an issue
      uses: actions/github-script@v7
      with:
        script: |
          const { data: currentPr } = await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.payload.pull_request.number
          });

          const prBody = currentPr.body ?? "";
          const escapeRegex = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

          const hasClosingKeywordWithIssueNumber = /\b(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#\d+\b/i.test(prBody);
          const hasIssueUrl = new RegExp(
            `\\bhttps://github\\.com/${escapeRegex(context.repo.owner)}/${escapeRegex(context.repo.repo)}/issues/\\d+\\b`,
            "i"
          ).test(prBody);

          if (!hasClosingKeywordWithIssueNumber && !hasIssueUrl) {
            core.setFailed(
              "PR must link to a project issue in its description. Add something like 'Closes #123' or an issue URL."
            );
          }

  build-and-test:
    runs-on: ubuntu-latest
    needs: validate-pr-issue-link
    
    services:
      postgres:
        image: postgres:18.2
        env:
          POSTGRES_USER: harmonie_user
          POSTGRES_PASSWORD: harmonie_password
          POSTGRES_DB: harmonie_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --no-restore --configuration Release
      
    - name: Run database migrations
      run: dotnet run --project tools/Harmonie.Migrations/Harmonie.Migrations.csproj --configuration Release
      env:
        ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=harmonie_test;Username=harmonie_user;Password=harmonie_password"
        ASPNETCORE_ENVIRONMENT: Development
    
    - name: Run tests
      run: dotnet test --no-build --verbosity normal --configuration Release --collect:"XPlat Code Coverage"
      env:
        ASPNETCORE_ENVIRONMENT: Development
        ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=harmonie_test;Username=harmonie_user;Password=harmonie_password"
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.cobertura.xml
        fail_ci_if_error: false
